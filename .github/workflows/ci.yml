name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_FROZEN: "1"
  OFFLINE_MODE: "true"
  PRIVACY_MODE: "true"
  CLOUD_LLM_ENABLED: "false"
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  XAI_API_KEY: ""
  GROQ_API_KEY: ""
  OPIK_ENABLED: "false"
  OPIK_API_KEY: ""
  JSEARCH_API_KEY: ""
  ADZUNA_APP_ID: ""
  ADZUNA_APP_KEY: ""

jobs:
  quality:
    name: Python 3.12 quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          prune-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --frozen --all-extras --all-groups

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Validate repository and documentation
        run: uv run --frozen python scripts/check_repository.py

      - name: Run offline test suite
        run: uv run --frozen pytest

      - name: Build package
        run: uv build

      - name: Verify launcher permissions
        run: test -x start.sh && test -x start.command
